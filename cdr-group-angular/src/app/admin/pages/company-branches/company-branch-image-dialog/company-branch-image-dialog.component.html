<app-base-dialog
  [title]="dialogTitle"
  [saveLabel]="saveLabel"
  [saveDisabled]="saveDisabled"
  [loading]="loading"
  (save)="onSave()"
  (cancel)="onCancel()">

  <div class="image-dialog-content">
    <div class="image-preview" [class.pending]="pendingPreview">
      @if (pendingPreview) {
        <img [src]="pendingPreview" alt="" />
      } @else if (!removed && fullExistingUrl) {
        <img [src]="fullExistingUrl" alt="" />
      } @else {
        <mat-icon class="image-placeholder">image</mat-icon>
      }
    </div>

    @if (!pendingFile) {
      <div class="image-actions">
        <button type="button" mat-raised-button color="primary" (click)="triggerPick()" [disabled]="loading">
          <mat-icon>upload</mat-icon>
          {{ ((!removed && existingImageUrl) ? 'admin.companyBranches.replaceImage' : 'admin.companyBranches.selectImage') | translate }}
        </button>
        @if (!removed && existingImageUrl) {
          <button type="button" mat-stroked-button color="warn" (click)="removeExisting()" [disabled]="loading">
            <mat-icon>delete</mat-icon>
            {{ 'common.delete' | translate }}
          </button>
        }
      </div>
    } @else {
      <div class="image-actions">
        <button type="button" mat-stroked-button (click)="triggerPick()" [disabled]="loading">
          <mat-icon>refresh</mat-icon>
          {{ 'admin.companies.chooseAnother' | translate }}
        </button>
        <button type="button" mat-stroked-button color="warn" (click)="discardPending()" [disabled]="loading">
          <mat-icon>close</mat-icon>
          {{ 'common.cancel' | translate }}
        </button>
      </div>
    }

    <input
      #imageInput
      type="file"
      accept="image/*"
      style="display: none"
      (change)="onFileSelected($event)">
  </div>

</app-base-dialog>
