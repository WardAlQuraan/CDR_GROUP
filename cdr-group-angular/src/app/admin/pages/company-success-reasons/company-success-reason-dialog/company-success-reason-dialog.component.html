<app-base-dialog
  [title]="dialogTitle"
  [saveLabel]="saveLabel"
  [saveDisabled]="form.invalid"
  [loading]="loading"
  (save)="onSubmit()"
  (cancel)="onCancel()">

  <form [formGroup]="form" class="dialog-form">
    <div class="form-section section-primary">
      <div class="section-header">
        <div class="section-icon">
          <mat-icon>emoji_events</mat-icon>
        </div>
        <div class="section-title">{{ 'admin.companySuccessReasons.reasonInfo' | translate }}</div>
      </div>

      <div class="section-content">
        <app-form-field formControlName="reasonEn" type="textarea" label="admin.companySuccessReasons.reasonEn"
          placeholder="admin.companySuccessReasons.placeholders.reasonEn" textDir="ltr"
          [errors]="[
            {name: 'required', message: 'admin.companySuccessReasons.errors.reasonEnRequired'},
            {name: 'maxlength', message: 'admin.companySuccessReasons.errors.reasonMaxLength'}
          ]">
        </app-form-field>

        <app-form-field formControlName="reasonAr" type="textarea" label="admin.companySuccessReasons.reasonAr"
          placeholder="admin.companySuccessReasons.placeholders.reasonAr" textDir="rtl"
          [errors]="[
            {name: 'required', message: 'admin.companySuccessReasons.errors.reasonArRequired'},
            {name: 'maxlength', message: 'admin.companySuccessReasons.errors.reasonMaxLength'}
          ]">
        </app-form-field>
      </div>
    </div>
  </form>

</app-base-dialog>
