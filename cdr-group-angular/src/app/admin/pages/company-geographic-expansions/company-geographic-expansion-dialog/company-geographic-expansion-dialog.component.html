<app-base-dialog
  [title]="dialogTitle"
  [saveLabel]="saveLabel"
  [saveDisabled]="form.invalid"
  [loading]="loading"
  (save)="onSubmit()"
  (cancel)="onCancel()">

  <form [formGroup]="form" class="dialog-form">
    <div class="form-section section-primary">
      <div class="section-header">
        <div class="section-icon">
          <mat-icon>public</mat-icon>
        </div>
        <div class="section-title">{{ 'admin.companyGeographicExpansions.expansionInfo' | translate }}</div>
      </div>

      <div class="section-content">
        <app-form-field formControlName="titleEn" label="admin.companyGeographicExpansions.titleEn" icon="title"
          placeholder="admin.companyGeographicExpansions.placeholders.titleEn" textDir="ltr"
          [errors]="[
            {name: 'required', message: 'admin.companyGeographicExpansions.errors.titleEnRequired'},
            {name: 'maxlength', message: 'admin.companyGeographicExpansions.errors.titleMaxLength'}
          ]">
        </app-form-field>

        <app-form-field formControlName="titleAr" label="admin.companyGeographicExpansions.titleAr" icon="title"
          placeholder="admin.companyGeographicExpansions.placeholders.titleAr" textDir="rtl"
          [errors]="[
            {name: 'required', message: 'admin.companyGeographicExpansions.errors.titleArRequired'},
            {name: 'maxlength', message: 'admin.companyGeographicExpansions.errors.titleMaxLength'}
          ]">
        </app-form-field>

        <app-form-field formControlName="descriptionEn" type="textarea" label="admin.companyGeographicExpansions.descriptionEn"
          placeholder="admin.companyGeographicExpansions.placeholders.descriptionEn" textDir="ltr"
          [errors]="[{name: 'maxlength', message: 'admin.companyGeographicExpansions.errors.descriptionMaxLength'}]">
        </app-form-field>

        <app-form-field formControlName="descriptionAr" type="textarea" label="admin.companyGeographicExpansions.descriptionAr"
          placeholder="admin.companyGeographicExpansions.placeholders.descriptionAr" textDir="rtl"
          [errors]="[{name: 'maxlength', message: 'admin.companyGeographicExpansions.errors.descriptionMaxLength'}]">
        </app-form-field>
      </div>
    </div>
  </form>

</app-base-dialog>
