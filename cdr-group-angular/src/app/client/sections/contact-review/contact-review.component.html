<section class="contact-section section-padding" id="section_5">
  <div class="container">
    <div class="row">
      <div class="col-lg-6 col-12">
        <!-- Tabs -->
        <div class="section-tabs mb-4">
          <button class="section-tab" [class.active]="activeTab === 'contact'" (click)="activeTab = 'contact'">
            <i class="bi-envelope"></i>{{ 'contact.title' | translate }}
          </button>
          <button class="section-tab" [class.active]="activeTab === 'review'" (click)="activeTab = 'review'">
            <i class="bi-star"></i>{{ 'review.title' | translate }}
          </button>
          <button class="section-tab" [class.active]="activeTab === 'complaint'" (click)="activeTab = 'complaint'">
            <i class="bi-exclamation-triangle"></i>{{ 'complaint.title' | translate }}
          </button>
        </div>

        <!-- Contact Form -->
        @if (activeTab === 'contact') {
          <app-contact [companyId]="companyId"></app-contact>
        }

        <!-- Review Form -->
        @if (activeTab === 'review') {
          <app-review [companyId]="companyId"></app-review>
        }

        <!-- Complaint Form -->
        @if (activeTab === 'complaint') {
          <app-complaint [companyId]="companyId"></app-complaint>
        }
      </div>

      <div class="col-lg-6 col-12 mt-5 mt-lg-0">
        <div class="contact-info">
          <div class="map-container">
            <iframe
              src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3381.5!2d35.87!3d31.95!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzHCsDU3JzAwLjAiTiAzNcKwNTInMDAuMCJF!5e0!3m2!1sen!2sjo!4v1700000000000"
              width="100%"
              height="250"
              style="border:0; border-radius: 12px;"
              allowfullscreen=""
              loading="lazy"
              referrerpolicy="no-referrer-when-downgrade">
            </iframe>
          </div>

          <div class="contact-info-item">
            <div class="contact-info-body">
              <strong>Abdoun, Amman, Jordan 11183</strong>

              <p class="mt-2 mb-1">
                <a href="tel:+962798081801" class="text-white" dir="ltr">
                  <i class="bi-telephone"></i>
                  +962 798 081 801
                </a>
              </p>

              <p class="mb-0">
                <a href="https://wa.me/962798081801" target="_blank" rel="noopener" class="text-white">
                  <i class="bi-whatsapp"></i>
                  WhatsApp
                </a>
              </p>
            </div>

            <div class="contact-info-footer">
              <a href="https://www.bing.com/maps/search?q=abdon+amman%2C+Jordan%2C+amman%2C+11183%2C+JO" target="_blank" rel="noopener">{{ 'contact.getInTouch' | translate }}</a>
            </div>
          </div>
        </div>
      </div>
    </div>

    
  </div>
</section>
