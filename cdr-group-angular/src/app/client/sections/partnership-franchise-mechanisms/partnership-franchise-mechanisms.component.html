@if (hasMechanisms) {
  <section class="partnership-franchise-mechanisms-section" id="section_partnership_franchise_mechanisms"
    [style.--brand-primary]="primaryColorValue"
    [style.--brand-secondary]="secondaryColorValue">
    <div class="container">
      <div class="row">
        <div class="col-12 text-center mb-3">
          <h2 class="section-title">{{ 'partnershipFranchiseMechanisms.title' | translate }}</h2>
          <p class="section-subtitle">{{ 'partnershipFranchiseMechanisms.subtitle' | translate }}</p>
        </div>
      </div>

      <div class="mechanisms-grid">
        @for (item of mechanisms; track item.id; let i = $index) {
          @if (getDescription(item)) {
            <article class="mechanism-card" [style.--index]="i">
              <div class="mechanism-body">
                <p class="mechanism-description">{{ getDescription(item) }}</p>
              </div>
            </article>
          }
        }
      </div>
    </div>
  </section>
}
